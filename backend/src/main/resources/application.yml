spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/agentsgate?characterEncoding=UTF-8&useUnicode=true}
    username: ${DB_USER:agentsgate}
    password: ${DB_PASSWORD:agentsgate}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: "SET client_encoding TO 'UTF8'"
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
  admin:
    password: ${ADMIN_PASSWORD:admin1234}
  ai-review:
    enabled: ${AI_REVIEW_ENABLED:false}   # 設為 false 可在開發時跳過 AI 審核，自動核准進入人工審核佇列

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
