services:
  postgres:
    image: postgres:16-alpine
    container_name: agentsgate-postgres
    environment:
      POSTGRES_DB: agentsgate
      POSTGRES_USER: agentsgate
      POSTGRES_PASSWORD: agentsgate
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      LANG: en_US.UTF-8
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentsgate"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7-jammy
    container_name: agentsgate-mongo
    environment:
      MONGO_INITDB_DATABASE: agentsgate
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mongo_data:
